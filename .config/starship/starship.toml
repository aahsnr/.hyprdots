# Gentoo-specific optimizations
[gentoo_use]
format = "[$symbol($count)]($style) "
symbol = "¾░ú¿ "
style = "bold $blue"
threshold = 1

[gentoo_portage]
format = "[$symbol($count)]($style) "
symbol = "¾░ú¿ "
style = "bold $magenta"
threshold = 1

# Line breaks and spacing
[line_break]
disabled = false

[container]
symbol = "Ô¼ó"
style = "bold $blue"
format = "[$symbol]($style) "

[username]
style_user = "bold $blue"
style_root = "bold $red"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "@[$hostname]($style) "
trim_at = ".local"
style = "bold $green"

[time]
disabled = false
format = "[$time]($style) "
time_format = "%T"
utc_time_offset = "local"
style = "bold $comment"
