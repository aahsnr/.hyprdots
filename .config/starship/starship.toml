# Catppuccin Mocha color palette - official colors
palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

# Performance optimization
command_timeout = 1000
scan_timeout = 30

# Main prompt configuration
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold blue)"
vimcmd_symbol = "[❮](bold blue)"
vimcmd_replace_one_symbol = "[❮](bold purple)"
vimcmd_replace_symbol = "[❮](bold purple)"
vimcmd_visual_symbol = "[❮](bold yellow)"

[directory]
truncation_length = 3
truncate_to_repo = false
style = "bold blue"
read_only_style = "bold red"
read_only = " 󰌾"
home_symbol = "~"
use_logical_path = true

[git_branch]
symbol = " "
style = "bold mauve"
format = "on [$symbol$branch(:$remote_branch)]($style) "
truncation_length = 20
truncation_symbol = "…"

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = "✓"
stashed = "≡"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"
untracked = "?${count}"
conflicted = "=${count}"
style = "bold green"
format = "[$all_status$ahead_behind]($style) "

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "bold yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_commit]
commit_hash_length = 7
format = "[$hash$tag]($style) "
style = "bold green"
tag_symbol = " 🏷 "
tag_disabled = false

[package]
format = "is [$symbol$version]($style) "
symbol = " "
style = "bold blue"
display_private = false

[status]
symbol = "✗"
success_symbol = "✓"
not_executable_symbol = "🚫"
not_found_symbol = "🔍"
sigint_symbol = "🧱"
signal_symbol = "⚡"
style = "bold red"
format = "[$symbol$common_meaning$signal_name$maybe_int]($style) "
map_symbol = true
disabled = false

[cmd_duration]
min_time = 1000
format = "took [$duration]($style) "
style = "bold yellow"
show_milliseconds = true
show_notifications = false

[memory_usage]
disabled = false
threshold = 70
symbol = "󰍛 "
style = "bold peach"
format = "via $symbol[$ram( | $swap)]($style) "

[jobs]
threshold = 1
format = "[$symbol$number]($style) "
symbol = "✦"
style = "bold blue"

# Container and virtualization
[container]
symbol = "⬢ "
style = "bold blue"
format = "[$symbol$name]($style) "

[docker_context]
symbol = " "
style = "bold blue"
format = "via [$symbol$context]($style) "
detect_extensions = ["Dockerfile"]
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = [".docker"]

# System information
[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = false

[hostname]
ssh_only = false
format = "at [$hostname]($style) "
trim_at = ".local"
style = "bold green"
disabled = false

[time]
disabled = false
format = "at [$time]($style) "
time_format = "%T"
utc_time_offset = "local"
style = "bold overlay0"

[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol = "󰁽 "
empty_symbol = "󰂎 "
format = "[$symbol$percentage]($style) "
disabled = false

[[battery.display]]
threshold = 15
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

# Development environments
[aws]
symbol = "  "
style = "bold yellow"
format = "on [$symbol($profile)(\\($region\\))(\\[$duration\\])]($style) "

[azure]
symbol = "󰠅 "
style = "bold blue"
format = "on [$symbol($subscription)]($style) "

[gcloud]
symbol = "󱇶 "
style = "bold blue"
format = "on [$symbol$account(@$domain)(\\($project\\))]($style) "

[kubernetes]
symbol = "⎈ "
style = "bold blue"
format = "on [$symbol$context( \\($namespace\\))]($style) "
disabled = false

[terraform]
symbol = "󱁢 "
style = "bold mauve"
format = "via [$symbol$workspace]($style) "

[vagrant]
symbol = "⍱ "
style = "bold blue"
format = "via [$symbol$version]($style) "

# Programming languages
[bun]
symbol = " "
style = "bold yellow"
format = "via [$symbol$version]($style) "

[c]
symbol = " "
style = "bold blue"
format = "via [$symbol$version(-$name)]($style) "
