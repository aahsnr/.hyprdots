$line_break\
$character"""

# Main prompt configuration
[character]
success_symbol = "[´É▓](bold green)"
error_symbol = "[´É▓](bold red)"
vicmd_symbol = "[´É┤](bold blue)"
vimcmd_symbol = "[´É┤](bold blue)"
vimcmd_replace_one_symbol = "[´É┤](bold purple)"
vimcmd_replace_symbol = "[´É┤](bold purple)"
vimcmd_visual_symbol = "[´É┤](bold yellow)"

[directory]
truncation_length = 3
truncate_to_repo = false
style = "bold blue"
read_only_style = "bold red"
read_only = " ¾░î¥"
home_symbol = "~"
use_logical_path = true

[git_branch]
symbol = " "
style = "bold mauve"
format = "on [$symbol$branch(:$remote_branch)]($style) "
truncation_length = 20
truncation_symbol = "ÔÇĞ"

[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
up_to_date = "Ô£ô"
stashed = "Ôëí"
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "Ô£İ${count}"
untracked = "?${count}"
conflicted = "=${count}"
style = "bold green"
format = "[$all_status$ahead_behind]($style) "

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "bold yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_commit]
commit_hash_length = 7
format = "[$hash$tag]($style) "
style = "bold green"
tag_symbol = " ­şÅÀ "
tag_disabled = false

[package]
format = "is [$symbol$version]($style) "
symbol = " "
style = "bold blue"
display_private = false

[status]
symbol = "Ô£ù"
success_symbol = "Ô£ô"
not_executable_symbol = "­şÜ½"
not_found_symbol = "­şöı"
sigint_symbol = "­şğ▒"
signal_symbol = "ÔÜí"
style = "bold red"
format = "[$symbol$common_meaning$signal_name$maybe_int]($style) "
map_symbol = true
disabled = false

[cmd_duration]
min_time = 1000
format = "took [$duration]($style) "
style = "bold yellow"
show_milliseconds = true
show_notifications = false

[memory_usage]
disabled = false
threshold = 70
symbol = "¾░ıø "
style = "bold peach"
format = "via $symbol[$ram( | $swap)]($style) "

[jobs]
threshold = 1
format = "[$symbol$number]($style) "
symbol = "Ô£Ğ"
style = "bold blue"

# Container and virtualization
[container]
symbol = "Ô¼ó "
style = "bold blue"
format = "[$symbol$name]($style) "

[docker_context]
symbol = " "
style = "bold blue"
format = "via [$symbol$context]($style) "
detect_extensions = ["Dockerfile"]
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = [".docker"]

# System information
[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = false

[hostname]
ssh_only = false
format = "at [$hostname]($style) "
trim_at = ".local"
style = "bold green"
disabled = false

[time]
disabled = false
format = "at [$time]($style) "
time_format = "%T"
utc_time_offset = "local"
style = "bold overlay0"

[battery]
full_symbol = "¾░ü╣ "
charging_symbol = "¾░éä "
discharging_symbol = "¾░éâ "
unknown_symbol = "¾░ü¢ "
empty_symbol = "¾░éÄ "
format = "[$symbol$percentage]($style) "
disabled = false

[[battery.display]]
threshold = 15
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

# Development environments
[aws]
symbol = "  "
style = "bold yellow"
format = "on [$symbol($profile)(\($region\))(\[$duration\])]($style) "

[azure]
symbol = "¾░áà "
style = "bold blue"
format = "on [$symbol($subscription)]($style) "

[gcloud]
symbol = "¾▒çÂ "
style = "bold blue"
format = "on [$symbol$account(@$domain)(\($project\))]($style) "

[kubernetes]
symbol = "ÔÄê "
style = "bold blue"
format = "on [$symbol$context( \($namespace\))]($style) "
disabled = false

[terraform]
symbol = "¾▒üó "
style = "bold mauve"
format = "via [$symbol$workspace]($style) "

[vagrant]
symbol = "Ôı▒ "
style = "bold blue"
format = "via [$symbol$version]($style) "

