pyenv_prefix = ""

[ruby]
symbol = " "
style = "bold red"
format = "via [$symbol$version]($style) "

[rust]
symbol = " "
style = "bold red"
format = "via [$symbol$version]($style) "

[scala]
symbol = " "
style = "bold red"
format = "via [$symbol$version]($style) "

[swift]
symbol = " "
style = "bold peach"
format = "via [$symbol$version]($style) "

[zig]
symbol = " "
style = "bold yellow"
format = "via [$symbol$version]($style) "

# Shell detection
[shell]
bash_indicator = "bash"
fish_indicator = "fish"
zsh_indicator = "zsh"
powershell_indicator = "pwsh"
ion_indicator = "ion"
elvish_indicator = "elvish"
tcsh_indicator = "tcsh"
xonsh_indicator = "xonsh"
cmd_indicator = "cmd"
nu_indicator = "nu"
unknown_indicator = "shell"
format = "[$indicator]($style) "
style = "bold overlay1"
disabled = true

# Line breaks and spacing
[line_break]
disabled = false

# Custom modules for Fedora
[custom.dnf_updates]
command = "dnf check-update --quiet 2>/dev/null | grep -c '^[^[:space:]]' || echo 0"
when = "command -v dnf"
format = "[$symbol$output]($style) "
symbol = "󰮯 "
style = "bold red"
shell = ["bash", "--noprofile", "--norc"]
description = "Show DNF package updates"

[custom.flatpak_updates]
command = "flatpak remote-ls --updates 2>/dev/null | wc -l"
when = "command -v flatpak"
format = "[$symbol$output]($style) "
symbol = "󰏖 "
style = "bold blue"
shell = ["bash", "--noprofile", "--norc"]
description = "Show Flatpak updates"

[custom.podman_status]
command = "podman ps --format '{{.Names}}' 2>/dev/null | wc -l"
when = "command -v podman"
format = "[$symbol$output]($style) "
symbol = " "
style = "bold purple"
shell = ["bash", "--noprofile", "--norc"]
description = "Show running Podman containers"

[custom.selinux]
command = "getenforce 2>/dev/null || echo 'N/A'"
when = "command -v getenforce"
format = "[$symbol$output]($style) "
symbol = "🛡️ "
style = "bold green"
shell = ["bash", "--noprofile", "--norc"]
description = "Show SELinux status"

[custom.rpm_count]
command = "rpm -qa 2>/dev/null | wc -l"
when = "command -v rpm"
format = "[$symbol$output]($style) "
symbol = " "
style = "bold red"
shell = ["bash", "--noprofile", "--norc"]
description = "Show installed RPM packages count"

