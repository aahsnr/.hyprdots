# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Set the Catppuccin Mocha palette (must be at the top)
palette = "catppuccin_mocha"

# Inserts a blank line between shell prompts
add_newline = false

# Left side format - minimal with OS, username, and character
format = """
[](surface0)\
$os\
$username\
[](fg:surface0)\
$character"""

# Right side format - all other components
right_format = """
[](fg:peach)\
$directory\
[](bg:peach fg:green)\
$git_branch\
$git_status\
[](fg:green bg:teal)\
$c\
$golang\
$java\
$nodejs\
$python\
$rust\
$docker_context\
[](fg:teal bg:blue)\
$time\
[](fg:blue bg:yellow)\
$cmd_duration\
$jobs\
$status\
$battery\
[](fg:yellow)\
"""

# OS module
[os]
format = "[$symbol ]($style)"
style = "bg:surface0 fg:text"
disabled = false

[os.symbols]
Fedora = "¾░Żø"
Linux = "¾░īĮ"

# Username module
[username]
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:red"
format = '[$user ]($style)'

# Directory module with fish-like directory naming
[directory]
style = "fg:mantle bg:peach"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"
read_only = " ¾░īŠ"
home_symbol = "¾░ŗ£"
fish_style_pwd_dir_length = 1

[directory.substitutions]
"Documents" = "¾░łÖ"
"Downloads" = ""
"Music" = ""
"Pictures" = ""
"Videos" = ""
"Projects" = "¾░▓ŗ"
"Code" = ""
"Desktop" = ""

# Git branch module
[git_branch]
symbol = ""
style = "bg:green fg:mantle"
format = '[ $symbol $branch ]($style)'

# Git status module
[git_status]
style = "bg:green fg:mantle"
format = '[$all_status$ahead_behind ]($style)'
ahead = "ŌćĪ${count}"
behind = "ŌćŻ${count}"
diverged = "ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}"
up_to_date = "Ō£ō"
conflicted = "="
deleted = "Ō£ś"
renamed = "┬╗"
modified = "!"
staged = "+"
stashed = "$"
untracked = "?"

# Programming language modules
[c]
symbol = ""
style = "bg:teal fg:mantle"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = ""
style = "bg:teal fg:mantle"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = ""
style = "bg:teal fg:mantle"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:teal fg:mantle"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:teal fg:mantle"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:teal fg:mantle"
format = '[ $symbol ($version) ]($style)'

# Docker context
[docker_context]
symbol = ""
style = "bg:teal fg:mantle"
format = '[ $symbol $context ]($style)'

# Time module - 12-hour AM/PM format
[time]
disabled = false
time_format = "%I:%M %p"
style = "bg:blue fg:mantle"
format = '[ ¾░źö $time ]($style)'

# Character module with sensible icons
[character]
success_symbol = '[Ō×£](bold green)'
error_symbol = '[Ō×£](bold red)'
vimcmd_symbol = '[ŌØ«](bold yellow)'
vimcmd_visual_symbol = '[ŌØ«](bold cyan)'
vimcmd_replace_symbol = '[ŌØ«](bold purple)'
vimcmd_replace_one_symbol = '[ŌØ«](bold purple)'

# Command duration
[cmd_duration]
min_time = 2000
format = '[ $duration ]($style)'
style = "bg:yellow fg:mantle"

# Jobs indicator
[jobs]
symbol = "¾░£Ä"
style = "bg:yellow fg:mantle"
number_threshold = 1
format = '[ $symbol $number ]($style)'

# Status module
[status]
disabled = false
format = '[ $symbol$status ]($style)'
symbol = "Ō£ś"
not_executable_symbol = "­¤Ü½"
not_found_symbol = "­¤öŹ"
sigint_symbol = "­¤¦▒"
signal_symbol = "ŌÜĪ"
style = "bg:yellow fg:mantle"

# Battery indicator
[battery]
full_symbol = "¾░ü╣"
charging_symbol = "¾░éä"
discharging_symbol = "¾░éā"
unknown_symbol = "¾░üĮ"
empty_symbol = "¾░éÄ"
format = '[ $symbol$percentage ]($style)'

[[battery.display]]
threshold = 20
style = "bg:yellow fg:red"

[[battery.display]]
threshold = 50
style = "bg:yellow fg:maroon"

[[battery.display]]
threshold = 80
style = "bg:yellow fg:green"

# Package manager
[package]
format = "[ $symbol$version ]($style)"
symbol = "¾░ÅŚ"
style = "bg:yellow fg:mantle"

# Memory usage
[memory_usage]
disabled = false
threshold = 70
symbol = "¾░Źø"
style = "bg:yellow fg:mantle"
format = '[ $symbol $percentage ]($style)'

# Hostname for SSH sessions
[hostname]
ssh_only = true
format = '[ $ssh_symbol$hostname ]($style) in '
ssh_symbol = "¾░ó«"
style = "bg:yellow fg:mantle"

# Container detection
[container]
format = '[ $symbol \[$name\] ]($style)'
symbol = "¾░Ī©"
style = "bg:yellow fg:mantle"

# Sudo indicator
[sudo]
style = "bg:yellow fg:red"
symbol = "¾░Æā"
disabled = false
format = '[ $symbol ]($style)'

# Shell indicator
[shell]
fish_indicator = "¾░ł║"
bash_indicator = ""
zsh_indicator = "¾░░Ŗ"
powershell_indicator = "¾░©Ŗ"
disabled = false
format = '[ $indicator ]($style)'
style = "bg:yellow fg:mantle"

# Conda environment
[conda]
symbol = ""
style = "bg:yellow fg:mantle"
format = '[ $symbol$environment ]($style)'

# Git commit
[git_commit]
commit_hash_length = 7
format = '[ \($hash$tag\) ]($style)'
style = "bg:green fg:mantle"

# Git state
[git_state]
format = '[ \($state( $progress_current of $progress_total)\) ]($style)'
style = "bg:green fg:mantle"

# Line break module - disabled since not needed with right format
[line_break]
disabled = true

