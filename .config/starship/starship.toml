base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

# Performance optimization - FIXED timeout values
command_timeout = 10000  # Increased from 1000ms to 5000ms (5 seconds)
scan_timeout = 30

# Add format to control prompt order and layout
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_commit\
$package\
$c\
$cmake\
$cobol\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$golang\
$haskell\
$java\
$julia\
$kotlin\
$lua\
$nodejs\
$ocaml\
$perl\
$php\
$python\
$ruby\
$rust\
$scala\
$swift\
$zig\
$bun\
$container\
$docker_context\
$kubernetes\
$terraform\
$vagrant\
$aws\
$azure\
$gcloud\
$memory_usage\
$jobs\
$battery\
$time\
