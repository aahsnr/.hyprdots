# Shell detection
[shell]
bash_indicator = "bash"
fish_indicator = "fish"
zsh_indicator = "zsh"
powershell_indicator = "pwsh"
ion_indicator = "ion"
elvish_indicator = "elvish"
tcsh_indicator = "tcsh"
xonsh_indicator = "xonsh"
cmd_indicator = "cmd"
nu_indicator = "nu"
unknown_indicator = "shell"
format = "[$indicator]($style) "
style = "bold overlay1"
disabled = true

# Line breaks and spacing
[line_break]
disabled = false

# Custom modules for Fedora - FIXED with better error handling
[custom.dnf_updates]
command = "timeout 3s dnf check-update --quiet 2>/dev/null | grep -c '^[^[:space:]]' || echo 0"
when = "command -v dnf >/dev/null 2>&1"
format = "[$symbol$output]($style) "
symbol = "¾░«» "
style = "bold red"
shell = ["bash", "--noprofile", "--norc"]
description = "Show DNF package updates"

[custom.flatpak_updates]
command = "timeout 3s flatpak remote-ls --updates 2>/dev/null | wc -l || echo 0"
when = "command -v flatpak >/dev/null 2>&1"
format = "[$symbol$output]($style) "
symbol = "¾░Åû "
style = "bold blue"
shell = ["bash", "--noprofile", "--norc"]
description = "Show Flatpak updates"

[custom.podman_status]
command = "timeout 2s podman ps --format '{{.Names}}' 2>/dev/null | wc -l || echo 0"
when = "command -v podman >/dev/null 2>&1"
format = "[$symbol$output]($style) "
symbol = " "
style = "bold purple"
shell = ["bash", "--noprofile", "--norc"]
description = "Show running Podman containers"

[custom.selinux]
command = "timeout 1s getenforce 2>/dev/null || echo 'N/A'"
when = "command -v getenforce >/dev/null 2>&1"
format = "[$symbol$output]($style) "
symbol = "­şøí´©Å "
style = "bold green"
shell = ["bash", "--noprofile", "--norc"]
description = "Show SELinux status"

[custom.rpm_count]
command = "timeout 2s rpm -qa 2>/dev/null | wc -l || echo 0"
when = "command -v rpm >/dev/null 2>&1"
format = "[$symbol$output]($style) "
symbol = " "
style = "bold red"
shell = ["bash", "--noprofile", "--norc"]
description = "Show installed RPM packages count"

