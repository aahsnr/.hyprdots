style = "bold blue"
format = "via [$symbol$version]($style) "

[cobol]
symbol = "⚙️ "
style = "bold blue"
format = "via [$symbol$version]($style) "

[dart]
symbol = " "
style = "bold blue"
format = "via [$symbol$version]($style) "

[deno]
symbol = " "
style = "bold green"
format = "via [$symbol$version]($style) "

[dotnet]
symbol = " "
style = "bold blue"
format = "via [$symbol$version( 🎯 $tfm)]($style) "

[elixir]
symbol = " "
style = "bold mauve"
format = "via [$symbol$version \\(OTP $otp_version\\)]($style) "

[elm]
symbol = " "
style = "bold blue"
format = "via [$symbol$version]($style) "

[erlang]
symbol = " "
style = "bold red"
format = "via [$symbol$version]($style) "

[golang]
symbol = " "
style = "bold blue"
format = "via [$symbol$version]($style) "

[haskell]
symbol = " "
style = "bold mauve"
format = "via [$symbol$version]($style) "

[java]
symbol = " "
style = "bold red"
format = "via [$symbol$version]($style) "

[julia]
symbol = " "
style = "bold mauve"
format = "via [$symbol$version]($style) "

[kotlin]
symbol = " "
style = "bold blue"
format = "via [$symbol$version]($style) "

[lua]
symbol = " "
style = "bold blue"
format = "via [$symbol$version]($style) "

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol$version]($style) "
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]

[ocaml]
symbol = " "
style = "bold yellow"
format = "via [$symbol$version(\\($switch_indicator$switch_name\\))]($style) "

[perl]
symbol = " "
style = "bold blue"
format = "via [$symbol$version]($style) "

[php]
symbol = " "
style = "bold blue"
format = "via [$symbol$version]($style) "

[python]
symbol = " "
style = "bold blue"
format = "via [${symbol}${pyenv_prefix}(${version})(\\($virtualenv\\))]($style) "
