# Tokyo Night color scheme
[palette]
background = "#1a1b26"
foreground = "#c0caf5"
selection = "#33467c"
comment = "#565f89"
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
magenta = "#bb9af7"
red = "#f7768e"
yellow = "#e0af68"
black = "#15161e"
white = "#a9b1d6"
orange = "#ff9e64"
pink = "#f7768e"
purple = "#9d7cd8"

# Main configuration
[character]
success_symbol = "[ÔØ»](bold $green)"
error_symbol = "[ÔØ»](bold $red)"
vicmd_symbol = "[ÔØ«](bold $blue)"

[directory]
truncation_length = 3
truncate_to_repo = false
style = "bold $blue"
read_only_style = "bold $red"
read_only = " ´á¢"

[git_branch]
symbol = "´Éİ "
style = "bold $magenta"
format = "on [$symbol$branch]($style) "

[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
stashed = "Ôëí"
modified = "!"
untracked = "?"
deleted = "Ô£İ"
renamed = "┬╗"
style = "bold $green"
format = "[$all_status$ahead_behind]($style) "

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "bold $yellow"
format = "([$state( $progress_current/$progress_total)]($style)) "

[package]
format = "[$symbol$version]($style) "
symbol = "´Æç "
style = "bold $blue"

# Gentoo-specific optimizations
[status]
symbol = "Ô£ù"
success_symbol = "Ô£ô"
style = "bold $green"
format = "[$symbol $exit_code]($style) "
disabled = false

[cmd_duration]
min_time = 1000
format = "took [$duration]($style) "
style = "bold $yellow"

[memory_usage]
disabled = false
threshold = 75
symbol = "­şÉÅ"
style = "bold $orange"

[env_var]
variable = "WSL_DISTRO_NAME"
format = "via [$env_value]($style) "
style = "bold $green"

