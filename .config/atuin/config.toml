# Atuin configuration optimized for Fedora 42

# Core settings
auto_sync = true
update_check = false
sync_frequency = "10m"
sync_address = "https://api.atuin.sh"

# Search configuration
search_mode = "fuzzy"
filter_mode = "global"
filter_mode_shell_up_key_binding = "session"
inline_height = 10
show_preview = true
max_preview_height = 10
show_help = true
exit_mode = "return-original"
word_jump_mode = "emacs"

# Display settings
style = "compact"

# Key bindings - vim mode settings
keymap_mode = "vim-insert"

# Sync settings
sync_records = true

# Common commands to potentially filter
common_prefix = ["sudo", "doas"]
common_subcommands = false

# History filtering options
history_filter = [
    "^ls$",
    "^cd$",
    "^pwd$",
    "^exit$",
    "^clear$",
    "^history$"
]

# Daemon settings
daemon_timeout = 3000
